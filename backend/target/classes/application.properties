# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/meetingflow?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Nameera@786
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.meetingflow=DEBUG

# JWT Security Configurations
# Secret key must be a base64-encoded string of at least 256 bits (32 bytes).
# Below is a pre-generated secure key: "Y2hvb2NvbGF0ZS1jaGlwLWNvb2tpZS1zZWNyZXQtZ2VuZXJhdGVkLWtleS1mb3Itand0LXNpZ25pbmc="
meetingflow.jwt.secret=Y2hvb2NvbGF0ZS1jaGlwLWNvb2tpZS1zZWNyZXQtZ2VuZXJhdGVkLWtleS1mb3Itand0LXNpZ25pbmc=
# Token lifetime: 24 Hours in milliseconds (86400000 ms)
meetingflow.jwt.expiration=86400000

# Pluggable AI / NLP Configurations
# Set to true to mock AI locally using keyword parsing. If false and api-key is set, calls actual services.
meetingflow.ai.mock-enabled=true
meetingflow.ai.openai-api-key=YOUR_OPENAI_API_KEY
