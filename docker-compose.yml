services:
  db:
    image: mysql:8.0.36
    container_name: meetingflow_db
    restart: always
    environment:
      MYSQL_DATABASE: meetingflow
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Automatically run database schema and seed data on startup
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meetingflow_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meetingflow_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/meetingflow?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - MEETINGFLOW_AI_MOCK-ENABLED=true
    depends_on:
      db:
        condition: service_healthy
    networks:
      - meetingflow_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    container_name: meetingflow_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - meetingflow_net

volumes:
  mysql_data:

networks:
  meetingflow_net:
    driver: bridge
